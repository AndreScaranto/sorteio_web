{% extends 'base.html' %}

{% block title %}Cadastrar Novo Usuario{% endblock %}

{% block content %}
  <h2 style="margin-bottom: 20px;">Cadastrar novo usuário</h2>

  <form method="post" class="form-usuario">
    <label for="usuario">Nome:</label>
    <input name="usuario" id="usuario" required>

    <label for="senha">Senha:</label>
    <input name="senha" id="senha" type="password" required>

    <!--<label for="cpf">CPF:</label>
    <input name="cpf" id="cpf" required style="padding: 8px; border-radius: 5px; border: 1px solid #ccc;">!-->

    <div class="celular" style="min-width: 300px;">
      <label for="ddd">DDD: </label>
      <input
        type="text"
        id="ddd"
        name="ddd"
        inputmode="numeric"
        pattern="[0-9]{2}"
        maxlength="2"
        placeholder="99"
        required
        style="max-width:35px;"
      >

      <label for="numero" style="margin-left: 20px;">Número: </label>
      <input
        type="text"
        id="numero"
        name="numero"
        inputmode="numeric"
        pattern="[0-9]{8,9}"
        maxlength="9"
        placeholder="99999999"
        required
        style="max-width:100px;"
      >
    </div>

    <input type="hidden" id="celular" name="celular">
    <script>
      const dddInput = document.getElementById('ddd');
      const numeroInput = document.getElementById('numero');
      const celularInput = document.getElementById('celular');

      function somenteDigitos(e) {
        e.target.value = e.target.value.replace(/\D/g, '');
      }

      dddInput.addEventListener('input', somenteDigitos);
      numeroInput.addEventListener('input', somenteDigitos);

      // Avançar automaticamente para o próximo campo quando forem digitados dois números de DDD
      dddInput.addEventListener('input', () => {
        if (dddInput.value.length === 2) {
          numeroInput.focus();
        }
      });

      // Validar antes de submeter
      function validarCelular() {
        const ddd = dddInput.value.trim();
        const numero = numeroInput.value.trim();

        if (ddd.length !== 2) {
          alert('DDD deve ter 2 dígitos.');
          dddInput.focus();
          return false;
        }

        if (numero.length < 8 || numero.length > 9) {
          alert('Número deve ter 8 ou 9 dígitos.');
          numeroInput.focus();
          return false;
        }

        // Combinar os valores para mandar para o backend
        celularInput.value = `(${ddd}) ${numero}`;
        return true;
      }
    </script>

    <div style="font-size:14px;"> 
    <input type="checkbox" id="lgpd" required> 
    
    <label for="lgpd"> 
    Declaro que li e concordo com a coleta e tratamento dos meus dados pessoais 
    fornecidos neste formulário. Os dados serão utilizados exclusivamente para 
    análise de comportamento do consumidor, contato e participação nos sorteios 
    promovidos pela empresa, conforme a 
    Lei Geral de Proteção de Dados (Lei nº 13.709/2018). 
    </label> 
    </div>

    <button type="submit" style="padding: 10px; background-color: #dc3545; color: white; border: none; border-radius: 5px;">
      Cadastrar novo usuário
    </button>
  </form>
  <script>
    document.querySelector('form').addEventListener('submit', (e) => {
      if (!validarCelular()) {
        e.preventDefault();
      }
    });
  </script>
  {% if resultado %}
    <div style="margin-top: 20px; padding: 12px; background-color: #d4edda; border-left: 5px solid #28a745;">
      Novo usuário adicionado com sucesso!
    </div>
  {% endif %}
{% endblock %}
