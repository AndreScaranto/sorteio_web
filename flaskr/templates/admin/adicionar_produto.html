{% extends 'base.html' %}

{% block title %}Adicionar Novo Produto{% endblock %}

{% block content %}
  <h2 style="margin-bottom: 20px;">Adicionar Novo Produto</h2>

  <form class="formulario" method="post" style="gap: 12px;">
    <div>
      <label for="nome" style="font-weight: bold;">Nome do Sorteio</label><br>
      <input class="inserir" name="nome" id="nome" required>
    </div>
    <div>
      <label for="preco" style="font-weight: bold;">Preço do Produto</label><br>
      <input name="preco" id="preco" type="number" step="0.01" required>
    </div>
    <button class="blue-button" type="submit">
      Criar Produto
    </button>
  </form>
{% endblock %}
