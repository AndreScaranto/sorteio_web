{% extends 'base.html' %}

{% block title %}Alterar Produto{% endblock %}

{% block content %}
  <h2 style="margin-bottom: 20px;">Alterar Produto</h2>

  <form class="formulario" method="post" style="gap: 12px;">
    <input name="produto_id" type="hidden" value="{{produto.id_produto}}">
    <div>
      <label for="nome" style="font-weight: bold;">Nome do Sorteio</label><br>
      <input class="inserir" name="nome" id="nome" value="{{produto.nome}}" required>
    </div>
    <div>
      <label for="preco" style="font-weight: bold;">Preço do Produto</label><br>
      <input name="preco" id="preco" value="{{produto.preco_atual}}" type="number" step="0.01" required>
    </div>
    <button class="blue-button" type="submit">
      Alterar Produto
    </button>
  </form>
{% endblock %}
